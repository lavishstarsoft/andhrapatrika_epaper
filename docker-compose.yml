services:
  andhrapatrika:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: andhrapatrika-epaper
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
