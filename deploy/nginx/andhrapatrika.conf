# Nginx reverse proxy for Andhra Patrika Epaper
# Place in: /etc/nginx/sites-available/andhrapatrika
# Enable:   sudo ln -s /etc/nginx/sites-available/andhrapatrika /etc/nginx/sites-enabled/
# Test:     sudo nginx -t && sudo systemctl reload nginx

# Redirect bare domain → www
server {
    listen 80;
    listen [::]:80;
    server_name andhrapatrikaa.com;
    return 301 https://www.andhrapatrikaa.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.andhrapatrikaa.com;

    # Certbot will add SSL — run: sudo certbot --nginx -d www.andhrapatrikaa.com -d andhrapatrikaa.com
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large PDF uploads (server-side conversion)
        client_max_body_size 100m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }
}
